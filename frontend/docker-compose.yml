services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/uploaded_files:/app/uploaded_files
    env_file:
      - ./backend/.env
    networks:
      - careermate-network

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - careermate-network

networks:
  careermate-network:
    driver: bridge